<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — OnlyBees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <style>
    .auth-card { max-width: 500px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:480px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <a href="home.html" class="header-logo">OnlyBees.</a>
  <nav id="main-nav">
    <a href="home.html">Home</a>
    <a href="services.html">Services</a>
    <a href="login.html" class="nav-login">Login</a>
  </nav>
  <button class="menu-toggle" onclick="document.getElementById('main-nav').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="auth-page">
  <div class="auth-card">
    <div class="logo">OnlyBees.</div>
    <h2>Create an account</h2>
    <p class="subtitle">Join thousands of travellers who trust OnlyBees.</p>

    <form onsubmit="return signupUser()">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required autocomplete="name">
      </div>
      <div class="two-col">
        <div class="input-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>
        <div class="input-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>
      </div>
      <div class="input-group">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Street, City, State" required>
      </div>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required>
      </div>
      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
      </div>
      <p style="font-size:0.76rem;color:#aaa;margin-bottom:14px">By signing up you agree to our <a href="#" style="color:var(--black);text-decoration:underline">Terms</a> and <a href="#" style="color:var(--black);text-decoration:underline">Privacy Policy</a>.</p>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-link" style="margin-top:18px">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<div id="toast-container"></div>
<script src="auth.js"></script>
</body>
</html>
